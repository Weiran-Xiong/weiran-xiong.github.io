# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Theme Settings
#
# Review documentation to determine if you should use `theme` or `remote_theme`
# https://mmistakes.github.io/minimal-mistakes/docs/quick-start-guide/#installing-the-theme

# theme: "minimal-mistakes-jekyll"
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dirt"  # "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Settings
locale: "en-US"
rtl: false  # true, false (default) # turns direction of the page into right to left for RTL languages

title: "Weiran Xiong"
description: "M.Phil. student in Math, FDU"
baseurl: ""  # Keep blank for GitHub Pages personal homepage
url: "https://weiran-xiong.github.io"  # Your GitHub Pages URL

repository: ""  # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes"
teaser: ""  # Path of fallback teaser image, e.g. "/assets/images/500x300.png"
logo: ""  # Path of logo image to display in the masthead, e.g. "/assets/images/88x88.png"
masthead_title: ""  # Overrides the website title displayed in the masthead, use "" for no title

layout:
  width: "wide"  # Could also be "narrow" or "default"

breadcrumbs: false
words_per_minute: 200
enable_copy_code_button: false
copyright: ""  # "copyright" name, defaults to site.title
copyright_url: ""  # "copyright" URL, defaults to site.url
comments:
  provider: false  # false (default), "disqus", "discourse", "facebook", "staticman", "staticman_v2", "utterances", "giscus", "custom"

reCaptcha:
  siteKey: ""
  secret: ""

atom_feed:
  path: ""  # blank (default) uses feed.xml
  hide: false

search: false
search_full_content: false
search_provider: lunr  # lunr (default), algolia, google

# Social Sharing
twitter:
  username: ""
facebook:
  username: ""
  app_id: ""
  publisher: ""
og_image: ""  # Open Graph/Twitter default site image

# Analytics
analytics:
  provider: false  # false (default), "google", "google-universal", "google-gtag", "custom"

# Site Author
author:
  name: "Weiran Xiong"
  avatar: "/assets/images/profile.jpg"  # Path to your profile picture
  bio: "M.Phil. student in Math, FDU"
  location: "Shanghai, China"
  email: "24210850005@m.fudan.edu.cn"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Weiran-Xiong"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/your-linkedin/"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Weiran-Xiong"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

custom_css:
  - "/assets/css/custom.css"

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed  # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
timezone: ""  # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Pagination with jekyll-paginate
paginate: 5  # amount of posts to show
paginate_path: /page:num/

# Pagination with jekyll-paginate-v2
pagination:
  enabled: false
  debug: false
  collection: 'posts'
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  category: 'posts'
  tag: ''
  locale: ''
  trail:
    before: 2
    after: 2

# Plugins (previously gems)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
